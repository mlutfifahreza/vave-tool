syntax = "proto3";

package product;

option go_package = "github.com/vave-tool/proto";

import "google/protobuf/timestamp.proto";

service ProductService {
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
  rpc GetProduct(GetProductRequest) returns (GetProductResponse);
  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse);
  rpc UpdateProduct(UpdateProductRequest) returns (UpdateProductResponse);
  rpc DeleteProduct(DeleteProductRequest) returns (DeleteProductResponse);
}

service CategoryService {
  rpc ListCategories(ListCategoriesRequest) returns (ListCategoriesResponse);
  rpc GetCategory(GetCategoryRequest) returns (GetCategoryResponse);
  rpc CreateCategory(CreateCategoryRequest) returns (CreateCategoryResponse);
  rpc UpdateCategory(UpdateCategoryRequest) returns (UpdateCategoryResponse);
  rpc DeleteCategory(DeleteCategoryRequest) returns (DeleteCategoryResponse);
}

service SubcategoryService {
  rpc ListSubcategories(ListSubcategoriesRequest) returns (ListSubcategoriesResponse);
  rpc GetSubcategory(GetSubcategoryRequest) returns (GetSubcategoryResponse);
  rpc GetSubcategoriesByCategory(GetSubcategoriesByCategoryRequest) returns (GetSubcategoriesByCategoryResponse);
  rpc CreateSubcategory(CreateSubcategoryRequest) returns (CreateSubcategoryResponse);
  rpc UpdateSubcategory(UpdateSubcategoryRequest) returns (UpdateSubcategoryResponse);
  rpc DeleteSubcategory(DeleteSubcategoryRequest) returns (DeleteSubcategoryResponse);
}

message Product {
  string id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  int32 stock_quantity = 5;
  string category_id = 6;
  string category_name = 7;
  string subcategory_id = 8;
  string subcategory_name = 9;
  string sku = 10;
  bool is_active = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message Category {
  string id = 1;
  string name = 2;
  string description = 3;
  bool is_active = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message Subcategory {
  string id = 1;
  string category_id = 2;
  string name = 3;
  string description = 4;
  bool is_active = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message ListProductsRequest {
  int32 page = 1;
  int32 size = 2;
}

message ListProductsResponse {
  repeated Product products = 1;
}

message GetProductRequest {
  string id = 1;
}

message GetProductResponse {
  Product product = 1;
}

message CreateProductRequest {
  string name = 1;
  string description = 2;
  double price = 3;
  int32 stock_quantity = 4;
  string category_id = 5;
  string subcategory_id = 6;
  string sku = 7;
  bool is_active = 8;
}

message CreateProductResponse {
  Product product = 1;
}

message UpdateProductRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  int32 stock_quantity = 5;
  string category_id = 6;
  string subcategory_id = 7;
  string sku = 8;
  bool is_active = 9;
}

message UpdateProductResponse {
  Product product = 1;
}

message DeleteProductRequest {
  string id = 1;
}

message DeleteProductResponse {
  bool success = 1;
}

// Category service messages
message ListCategoriesRequest {
  int32 page = 1;
  int32 size = 2;
}

message ListCategoriesResponse {
  repeated Category categories = 1;
}

message GetCategoryRequest {
  string id = 1;
}

message GetCategoryResponse {
  Category category = 1;
}

message CreateCategoryRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  bool is_active = 4;
}

message CreateCategoryResponse {
  Category category = 1;
}

message UpdateCategoryRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  bool is_active = 4;
}

message UpdateCategoryResponse {
  Category category = 1;
}

message DeleteCategoryRequest {
  string id = 1;
}

message DeleteCategoryResponse {
  bool success = 1;
}

// Subcategory service messages
message ListSubcategoriesRequest {
  int32 page = 1;
  int32 size = 2;
}

message ListSubcategoriesResponse {
  repeated Subcategory subcategories = 1;
}

message GetSubcategoryRequest {
  string id = 1;
}

message GetSubcategoryResponse {
  Subcategory subcategory = 1;
}

message GetSubcategoriesByCategoryRequest {
  string category_id = 1;
  int32 page = 2;
  int32 size = 3;
}

message GetSubcategoriesByCategoryResponse {
  repeated Subcategory subcategories = 1;
}

message CreateSubcategoryRequest {
  string id = 1;
  string category_id = 2;
  string name = 3;
  string description = 4;
  bool is_active = 5;
}

message CreateSubcategoryResponse {
  Subcategory subcategory = 1;
}

message UpdateSubcategoryRequest {
  string id = 1;
  string category_id = 2;
  string name = 3;
  string description = 4;
  bool is_active = 5;
}

message UpdateSubcategoryResponse {
  Subcategory subcategory = 1;
}

message DeleteSubcategoryRequest {
  string id = 1;
}

message DeleteSubcategoryResponse {
  bool success = 1;
}
