server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service_name'
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            service_name: service_name
            timestamp: timestamp
      - labels:
          level:
          service_name:
      - timestamp:
          source: timestamp
          format: RFC3339
      - output:
          source: msg

  - job_name: vave-tool-api
    static_configs:
      - targets:
          - localhost
        labels:
          job: vave-tool-api
          service_name: vave-tool-api
          __path__: /var/log/vave-tool/api.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            timestamp: timestamp
            trace_id: trace_id
            method: method
            path: path
            status_code: status_code
            duration_seconds: duration_seconds
      - labels:
          level:
      - structured_metadata:
          trace_id:
          method:
          path:
          status_code:
          duration_seconds:
      - timestamp:
          source: timestamp
          format: RFC3339
      - template:
          source: output
          template: '{{ .msg }} trace_id={{ .trace_id }}'
      - output:
          source: output
